<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Barber Flow</title>\n</head>\n<body>\n    <button id="alterarPlanoBtn">Alterar Plano</button>\n    <div id="planModal" style="display:none;">\n        <h2>Escolha seu plano</h2>\n        <button data-plan="Básico" data-price="49">Básico R$49</button>\n        <button data-plan="Profissional" data-price="129">Profissional R$129</button>\n        <button data-plan="Premium" data-price="299">Premium R$299</button>\n        <button id="closePlanModal">Fechar</button>\n    </div>\n\n    <div id="paymentModal" style="display:none;">\n        <h2>Dados de Pagamento</h2>\n        <label for="cardHolder">Nome do Titular:</label>\n        <input type="text" id="cardHolder">\n        <label for="cardNumber">Número do Cartão:</label>\n        <input type="text" id="cardNumber">\n        <label for="validity">Validade (MM/YY):</label>\n        <input type="text" id="validity">\n        <label for="cvv">CVV:</label>\n        <input type="text" id="cvv">\n        <button id="confirmPayment">Confirmar Pagamento</button>\n        <button id="closePaymentModal">Fechar</button>\n    </div>\n\n    <script>\n        let trialStartDate = new Date(); // Set this date as per your logic\n        let currentDate = new Date();\n        const sevenDaysLater = new Date(trialStartDate);\n        sevenDaysLater.setDate(sevenDaysLater.getDate() + 7);\n\n        document.getElementById('alterarPlanoBtn').onclick = function() {\n            document.getElementById('planModal').style.display = 'block';\n        };\n\n        document.getElementById('closePlanModal').onclick = function() {\n            document.getElementById('planModal').style.display = 'none';\n        };\n\n        document.querySelectorAll('[data-plan]').forEach(button => {\n            button.onclick = function() {\n                document.getElementById('planModal').style.display = 'none';\n                document.getElementById('paymentModal').style.display = 'block';\n                // Store selected plan in localStorage\n                localStorage.setItem('selectedPlan', this.dataset.plan);\n                localStorage.setItem('planPrice', this.dataset.price);\n            };\n        });\n\n        document.getElementById('closePaymentModal').onclick = function() {\n            document.getElementById('paymentModal').style.display = 'none';\n        };\n\n        document.getElementById('confirmPayment').onclick = function() {\n            const now = new Date();\n            if (now <= sevenDaysLater) {\n                console.log('Subscription Confirmed'); // Add your confirmation logic here\n            } else {\n                alert('Cancellation period expired! You cannot cancel after 7 days.');\n            }\n        };\n    <\/script>\n</body>\n</html>
